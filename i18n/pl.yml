title: Ściąga z Funkcji Przejścia
description:
  Spraw, aby animacje wyglądały bardziej realistycznie, dobierając odpowiednie funkcje przejścia (tzw. easings).
share:
  Funkcje przejścia określają tempo animacji, sprawiając, że ruch wygląda naturalniej. Prawdziwe obiekty nie poruszają się ze stałą prędkością, ani nie zatrzymują się natychmiastowo.
  Ta strona pomoże Ci wybrać odpowiednią funkcję przejścia.

about: __format
  ~~Funkcje przejścia~~ określ tempo zmian parametru w czasie.

  Obiekty w rzeczywistości nie ruszają ani nie zatrzymują się natychmiastowo i prawie nigdy nie poruszają się ze stałą prędkością. Kiedy wysuwamy szufladę, najpierw robimy to szybko, a pod koniec zwalniamy. Gdy upuścisz coś na podłogę, przedmiot przyspiesza w dół, a po uderzeniu odbija się.

  Ta strona pomoże Ci wybrać odpowiednią funkcję przejścia.

howtos:
  css:
    text: W CSS-ie, takie właściwości jak przemiana (transition) oraz animacja (animation) pozwalają na określenie dla nich funkcji przejścia.
    edit: Edytuj na ^cubic-bezier.com^.
    with_animation: W CSS-ie, taka funkcja może zostać zaimplementowana za pomocą {{@keyframes}}
    example_size: Rozmiar
    example_position: Pozycja
    example_opacity: Przezroczystość

  postcss:
    text:
      Funkcje przejścia są znacznie łatwiejsze w użyciu z PostCSS.
      Plugin ^postcss-easings^ pobiera definicje przejść z tej strony.
    explanation: Ta deklaracja jest zamieniana na powyższy kod.
    disabled:
      Niestety, tej funkcji przejścia nie można ustawić za pomocą pluginu PostCSS.
      Zobacz powyżej, jak uzyskać ten efekt przy użyciu {{@keyframes}}.

  gradient:
    name: Gradient
    text: Możesz narysować gradient używając ^postcss-easing-gradients^.

  mathfunction:
    name: Funkcje matematyczne
    text:
      Poniżej znajduje się kod funkcji przejścia w języku TypeScript.
      Zmienna x reprezentuje postęp animacji w zakresie od 0 (początek) do 1 (koniec).

